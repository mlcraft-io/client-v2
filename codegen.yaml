schema:
  - ${VITE_GRAPHQL_URL}:
      headers:
        x-hasura-admin-secret: ${VITE_HASURA_ADMIN_SECRET}
documents: src/**/*.gql
overwrite: true
generates:
  ./src/graphql/generated.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-apollo
      - named-operations-object
    config:
      fetcher: fetch
      skipTypename: false
      withHooks: true
      withHOC: false
      withComponent: false